services:
  # ── Frontend estático (o app em si) ──────────────────────────────────
  - type: web
    name: copeiro
    runtime: static
    buildCommand: ""
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

  # ── Backend do multiplayer (WebSocket) ───────────────────────────────
  - type: web
    name: copeiro-multiplayer
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    pullRequestPreviewsEnabled: false
